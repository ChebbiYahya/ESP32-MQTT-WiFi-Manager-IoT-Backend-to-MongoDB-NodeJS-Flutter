<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360">
  <defs>
    <style>
      .box { fill: #f5f7fb; stroke: #1f2937; stroke-width: 2; }
      .title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .label { font: 14px Arial, sans-serif; fill: #111827; }
      .arrow { stroke: #111827; stroke-width: 2; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
    </marker>
  </defs>

  <rect class="box" x="40" y="60" width="220" height="120" rx="10" />
  <text class="title" x="60" y="90">ESP32 + DHT11</text>
  <text class="label" x="60" y="120">Mesures température</text>
  <text class="label" x="60" y="140">et humidité</text>

  <rect class="box" x="300" y="60" width="200" height="120" rx="10" />
  <text class="title" x="320" y="90">Broker MQTT</text>
  <text class="label" x="320" y="120">Topic:</text>
  <text class="label" x="320" y="140">iot/esp32/sensor_data</text>

  <rect class="box" x="560" y="20" width="200" height="120" rx="10" />
  <text class="title" x="580" y="50">Backend Node.js</text>
  <text class="label" x="580" y="80">Abonnement MQTT</text>
  <text class="label" x="580" y="100">Stockage si T&gt;30°C</text>

  <rect class="box" x="560" y="200" width="200" height="120" rx="10" />
  <text class="title" x="580" y="230">Frontend Flutter</text>
  <text class="label" x="580" y="260">Affichage temps réel</text>
  <text class="label" x="580" y="280">+ historique HTTP</text>

  <rect class="box" x="820" y="20" width="140" height="120" rx="10" />
  <text class="title" x="840" y="50">MongoDB</text>
  <text class="label" x="840" y="80">Historique</text>

  <line class="arrow" x1="260" y1="120" x2="300" y2="120" />
  <line class="arrow" x1="500" y1="90" x2="560" y2="90" />
  <line class="arrow" x1="500" y1="140" x2="560" y2="240" />
  <line class="arrow" x1="760" y1="80" x2="820" y2="80" />
</svg>
